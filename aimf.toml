[repository]
# Local sample app shipped with AIMF for onboarding (no network required).
# Replace with your own repository:
#   path = "/absolute/or/relative/path/to/your-repo"
# Or clone from GitHub (also required for `aimf scan`):
#   url = "https://github.com/YOUR_ORG/YOUR_REPO"
#   branch = "main"
path = "examples/sample-js-app"

# Optional private-repository authentication (for GitHub URL clones).
# Never place token values in this file.
#
# [repository.authentication]
# type = "github_token"
# token_env = "AIMF_GITHUB_TOKEN"
#
# [repository.authentication]
# type = "ssh_agent"

[workspace]
directory = ".aimf/workspace"
clean_before_clone = true

# Engineering knowledge store (Increment 1). Not opened by assess yet.
# Independent of report retention under reports/.
[knowledge]
directory = ".aimf/knowledge"

[static_analysis]
# PMD is Java-oriented. Keep enabled=false for non-Java samples, or enable for Java repos.
enabled = false
fail_on_provider_error = false

[static_analysis.pmd]
enabled = true
executable = "pmd"
profile = "standard"
rulesets = [
  "category/java/bestpractices.xml",
  "category/java/errorprone.xml",
  "category/java/design.xml",
]
minimum_priority = 5
timeout_seconds = 120

# Optional AWS session for --with-ai (preferred over exporting AWS_PROFILE / AWS_REGION).
# After `aws sso login --profile <profile-name>`, set profile below (or export AWS_PROFILE).
[aws]
profile = "aimf"
region = "us-east-1"

# Bedrock Converse defaults for --with-ai
[ai]
provider = "bedrock"

[ai.bedrock]
model_id = "amazon.nova-lite-v1:0"
