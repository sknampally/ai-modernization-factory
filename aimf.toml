[repository]
url = "https://github.com/spring-projects/spring-petclinic"
branch = "main"

# Optional private-repository authentication (disabled by default).
# Never place token values in this file.
#
# [repository.authentication]
# type = "github_token"
# token_env = "AIMF_GITHUB_TOKEN"
#
# [repository.authentication]
# type = "ssh_agent"

[workspace]
directory = ".aimf/workspace"
clean_before_clone = true

[static_analysis]
enabled = true
fail_on_provider_error = false

[static_analysis.pmd]
enabled = true
executable = "pmd"
profile = "standard"
rulesets = [
  "category/java/bestpractices.xml",
  "category/java/errorprone.xml",
  "category/java/design.xml",
]
minimum_priority = 5
timeout_seconds = 120

# Optional AWS session for --with-ai (preferred over exporting AWS_PROFILE / AWS_REGION).
# After `aws configure sso` and `aws sso login --profile aimf`, AIMF uses this profile.
[aws]
profile = "aimf"
region = "us-east-1"

# Bedrock Converse defaults for --with-ai
[ai]
provider = "bedrock"

[ai.bedrock]
model_id = "amazon.nova-lite-v1:0"
